<div class="project-details-container">
  <div *ngIf="loading" class="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <div *ngIf="!loading && project">
    <mat-card class="project-card">
      <mat-card-header>
        <mat-card-title>{{ project.title }}</mat-card-title>
        <mat-card-subtitle>{{ project.description }}</mat-card-subtitle>
      </mat-card-header>
    </mat-card>

    <h2>Videos</h2>
    <div class="videos-grid">
      <mat-card *ngFor="let video of videos" class="video-card">
        <mat-card-header>
          <mat-card-title>{{ video.title }}</mat-card-title>
          <mat-card-subtitle>{{ video.description }}</mat-card-subtitle>
        </mat-card-header>
        <mat-card-content>
          <video *ngIf="video.url" [src]="video.url" controls width="100%"></video>
        </mat-card-content>
        <mat-card-actions>
          <button mat-button (click)="loadComments(video.id)">
            <mat-icon>comment</mat-icon>
            Comments
          </button>
        </mat-card-actions>

        <div *ngIf="comments.length > 0 && newComment.videoId === video.id" class="comments-section">
          <mat-card *ngFor="let comment of comments" class="comment-card">
            <mat-card-content>
              <strong>{{ comment.userName }}</strong>
              <p>{{ comment.content }}</p>
            </mat-card-content>
          </mat-card>
        </div>

        <div class="add-comment">
          <mat-form-field appearance="outline" class="full-width">
            <mat-label>Add a comment</mat-label>
            <input matInput [(ngModel)]="newComment.content" placeholder="Write a comment...">
          </mat-form-field>
          <button mat-raised-button color="primary" (click)="addComment(video.id)">
            <mat-icon>send</mat-icon>
            Comment
          </button>
        </div>
      </mat-card>
    </div>

    <div *ngIf="videos.length === 0" class="empty">
      No videos in this project yet.
    </div>
  </div>
</div>
