<div class="dashboard-container">
  <h1>Dashboard</h1>

  <div *ngIf="loading" class="loading">
    <mat-spinner diameter="40"></mat-spinner>
  </div>

  <div *ngIf="error" class="error">
    {{ error }}
  </div>

  <div *ngIf="!loading && !error" class="projects-grid">
    <mat-card *ngFor="let project of projects" class="project-card">
      <mat-card-header>
        <mat-card-title>{{ project.title }}</mat-card-title>
        <mat-card-subtitle>{{ project.description }}</mat-card-subtitle>
      </mat-card-header>
      <mat-card-actions>
        <button mat-button [routerLink]="['/project-details', project.id]">
          <mat-icon>visibility</mat-icon>
          View
        </button>
      </mat-card-actions>
    </mat-card>
  </div>

  <div *ngIf="!loading && !error && projects.length === 0" class="empty">
    No projects found. Create your first project!
  </div>

  <button mat-fab color="primary" class="fab-button" routerLink="/create-project">
    <mat-icon>add</mat-icon>
  </button>
</div>
